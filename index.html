<main class="stage" id="lexis" aria-label="LEXIS. A field of glyphs, a line you arrange them into, and the state that line means. Every arrangement is answered. Press R at any time to hear the whole field again; a glyph focused in the line reads the field up to that point.">

  <!-- THE STATE: the live grid the current line means. Visual only; the screen-reader truth is the
       result live region below, which narrates this same state in words. -->
  <section class="state" aria-hidden="true">
    <div class="grid" id="grid"></div>
  </section>

  <!-- THE LINE: the open composition strip -->
  <div class="linewrap">
    <div class="line" id="line" role="group" aria-label="the line — the glyphs you have arranged, left to right; each glyph says its position"></div>
    <div class="controls">
      <button type="button" class="linkbtn" id="keep" aria-label="Keep this line as a link">keep this line</button>
      <button type="button" class="linkbtn" id="clear">clear the line</button>
    </div>
    <!-- the answer line: at rest it carries the promise; after every act it carries the answer
         itself, in words — the same words the screen reader hears (aria-hidden to avoid
         double-speak; the live region remains the spoken truth) -->
    <p class="caption" id="answer" aria-hidden="true">Every arrangement is answered.</p>
  </div>

  <!-- THE FIELD: the palette. Glyph names are their shapes, not their meanings. -->
  <div class="palette" id="palette" role="toolbar" aria-label="the field of glyphs"></div>

  <!-- The two live regions (see docs: composition is silent; the result is the screen-reader truth) -->
  <p class="sr-only" id="result" role="status" aria-live="polite" aria-atomic="true"></p>
  <p class="sr-only" id="status" role="status" aria-live="polite"></p>

  <noscript>
    <div class="noscript">
      <p>LEXIS is a small interactive language and needs JavaScript. Nothing you do in it is
      recorded. The <a href="about.html">About page</a> describes the whole idea in words:
      four marks and three operators; you arrange them into a line, and a small field answers with
      the state that line means. There is no goal, no score, and nothing hidden — a small grammar
      whose stacking has no ceiling.</p>
    </div>
  </noscript>
</main>
